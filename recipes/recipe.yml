---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
# image will be published to ghcr.io/<user>/<name>
name: fedora-bluebuild-niri
description: A modified ublue-os using niri, a scrollable tiling Wayland compositor.

# the base image to build on top of (FROM) and the version tag to use
base-image: ghcr.io/ublue-os/base-main
image-version: 43 # latest is also supported if you want new updates ASAP

modules:
  - type: dnf
    repos:
      cleanup: true
      files:
        - https://repository.mullvad.net/rpm/stable/mullvad.repo
      copr:
        - avengemedia/dms
        - avengemedia/danklinux
        - quadratech188/vicinae
    install:
      install-weak-deps: false
      packages:
        - repo: mullvad-stable
          packages:
            - mullvad-vpn
        - alacritty
        - brightnessctl
        - cava
        - dms
        - dms-greeter
        - dgop
        - dsearch
        - gnome-keyring
        - gnome-keyring-pam
        - greetd
        - greetd-selinux
        - libvirt
        - libvirt-daemon-config-network
        - libvirt-daemon-kvm
        - kdeconnectd
        - kf6-kimageformats
        - khal
        - mako
        - matugen
        - mullvad-vpn
        - niri
        - qemu-kvm
        - tuned
        - tuned-ppd
        - vicinae
        - virt-install
        - xwayland-satellite
        - zsh
    remove:
      packages:
        - firefox
        - firefox-langpacks
        - htop
        - nvtop
  - type: files
    files:
      - source: system
        destination: /

  # module 'systemd' does not yet support `add-wants`
  - type: script
    snippets:
      - "systemctl --global add-wants niri.service dms.service"

  - type: systemd
    system:
      enabled:
        - greetd.service
    user:
      enabled:
        - dsearch.service
        #- mullvad-daemon
        #- mullvad-early-boot-blocking

  # module 'systemd' does not yet support `set-default`
  - type: script
    snippets:
      - "systemctl set-default graphical.target"

  #  - type: default-flatpaks
  #    configurations:
  #      - notify: true # Send notification after install/uninstall is finished (true/false)
  #        scope: system
  #        # If no repo information is specified, Flathub will be used by default
  #        install: # system flatpaks we want all users to have and not remove
  #          - org.mozilla.firefox
  #          - org.gnome.Loupe
  #      - scope: user # Also add Flathub user repo, but no user packages

  - type: signing # this sets up the proper policy & signing files for signed images to work fully
