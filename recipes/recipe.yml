---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
# image will be published to ghcr.io/<user>/<name>
name: fedora-bluebuild-niri
description: A modified ublue-os using niri, a scrollable tiling Wayland compositor.

# the base image to build on top of (FROM) and the version tag to use
base-image: ghcr.io/ublue-os/base-main
image-version: 43 # latest is also supported if you want new updates ASAP

modules:
  - type: dnf
    repos:
      cleanup: true
      files:
        - https://repository.mullvad.net/rpm/stable/mullvad.repo
      copr:
        - avengemedia/dms                   # repo for: cava, dankmaterialshell, dgop
        - avengemedia/danklinux             # repo for: dms-greeter, dgop, danksearch/dsearch, ghostty, matugen
        - lihaohong/yazi                    # repo for: yazi
        - quadratech188/vicinae             # repo for: vicinae
    install:
      install-weak-deps: false
      packages:
        - repo: mullvad-stable              # repo for: mullvad-vpn
          packages:
            - mullvad-vpn
        - alacritty                         # Terminal emulator
        # - brightnessctl                   # Brightness control for built-in screens
        # - cava                            # Audio visualiser
        - dms                               # DarkMaterialShell
        - dms-greeter                       # Skin for greeter login manager
        - dgop                              # CPU/GPU monitor
        - dsearch                           # Filesystem search
        # - ghostty                           # Terminal emulator
        - gnome-keyring                     # Password manager
        - gnome-keyring-pam                 # Password manager
        - greetd                            # Login manager
        - greetd-selinux                    # Login manager policy
        - libvirt                           # Virtualisation
        - libvirt-daemon-config-network     # Virtualisation
        - libvirt-daemon-kvm                # Virtualisation
        - kdeconnectd                       # Share files with mobile phones
        - kf6-kimageformats                 # Support more image formats
        - kitty                             # Terminal emulator
        # - khal                            # CalDAV integration
        - mako                              # Notifications
        - matugen                           # Material Design colour generator
        - mullvad-vpn                       # Mullvad VPN
        - nemo                              # GUI file manager
        - niri                              # Scrollable-tiling Wayland compositor
        - qemu-kvm                          # Virtualisation
        - tuned                             # Performance balancer
        - tuned-ppd                         # Performance balancer
        - vicinae                           # Quick launcher
        - virt-install                      # Virtualisation
        - xwayland-satellite                # XWayland integration
        - yazi                              # TUI file manager
        - zsh                               # Z shell
    remove:
      packages:
        - distrobox
        - firefox
        - firefox-langpacks
        - htop
        - nvtop
  - type: files
    files:
      - source: system
        destination: /

  # module 'systemd' does not yet support `add-wants`
  - type: script
    snippets:
      - "systemctl --global add-wants niri.service dms.service"

  - type: systemd
    system:
      enabled:
        - greetd.service
    user:
      enabled:
        - dsearch.service

  # module 'systemd' does not yet support `set-default`
  - type: script
    snippets:
      - "systemctl set-default graphical.target"

  - type: signing # this sets up the proper policy & signing files for signed images to work fully
